<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0f172a"/>
  
  <!-- 3D Building - front face -->
  <polygon points="16,44 16,24 32,16 48,24 48,44" fill="#1e3a5f" stroke="#f97316" stroke-width="1.5"/>
  
  <!-- 3D Building - roof ridge line -->
  <line x1="32" y1="16" x2="32" y2="36" stroke="#f97316" stroke-width="1.5" stroke-dasharray="0"/>
  
  <!-- 3D Building - left side face -->
  <polygon points="10,48 16,44 16,24 10,28" fill="#0e2a45" stroke="#f97316" stroke-width="1.5"/>
  
  <!-- Roof -->
  <polygon points="10,28 16,24 32,16 26,20" fill="#f97316" opacity="0.9"/>
  
  <!-- Door -->
  <rect x="27" y="34" width="10" height="10" rx="1" fill="#f97316" opacity="0.8"/>
  
  <!-- Windows -->
  <rect x="18" y="28" width="7" height="6" rx="1" fill="#f97316" opacity="0.5"/>
  <rect x="39" y="28" width="7" height="6" rx="1" fill="#f97316" opacity="0.5"/>
</svg>
